<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <title>Contactos</title>
    <link rel="stylesheet" href="/Css/styles.css">
    <link rel="stylesheet" href="/Css/styles.css">
</head>
<body>
    <header>
        <h1 class="titulo">Conctactos</h1>
    </header>

    <div class="nav">
        <nav class="navegacion-principal contenedor">
            <a href="/index.html">Inicio</a>
            <a href="/Sobre mi.html">Sobre mi</a>
            <a href="/Proyectos.html">Proyectos</a>
            <a href="/Contactos.html">Conctactos</a>
        </nav>
    </div>
    
    <section>
        <h2 class="h2">Contacto</h2>
        <form class="formulario">
            <fieldset>
                <legend>CONTACTÁNOS LLENANDO TODOS LOS CAMPOS</legend>
                <div class="campo">
                    <label>Nombre</label>
                    <input class="input-text" type="text" id="nombre" placeholder="Tu nombre">

                </div>
                <div class="campo">
                    <label>Teléfono</label>
                    <input class="input-text" type="tel" id="tlf" placeholder="Tu teléfono">

                </div>
                <div class="campo">
                    <label>Correo</label>
                    <input class="input-text" type="email" id="email" placeholder="Tu email">

                </div>
                <div class="campo">
                    <label>Mensaje</label>
                    <textarea class="input-text" name="mensaje" id="mensaje" cols="30" rows="10"></textarea>
                </div>
                <input class="boton" type="submit" value="ENVIAR">

            </fieldset>
        </form>


    </section>
</body>
</html>
